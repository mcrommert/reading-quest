# Copy to docker-compose.yml and adjust the port / paths if you like.
#   docker compose up -d --build
services:
  reading-bot:
    build: .
    image: reading-bot:latest
    ports:
      - "8602:8602"
    volumes:
      - ./data:/data     # persists reading.db across rebuilds
      # Your real family config (gitignored). Create reader_config.py from
      # reader_config_example.py, then uncomment to use it instead of the
      # sample readers baked into the image:
      # - ./reader_config.py:/app/reader_config.py:ro
      # Optional Google Calendar service-account key:
      # - ./gcal-credentials.json:/data/gcal-credentials.json:ro
    env_file:
      - .env
    restart: unless-stopped
