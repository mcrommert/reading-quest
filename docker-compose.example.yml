# Copy to docker-compose.yml and adjust the port / paths if you like.
#   docker compose up -d
services:
  reading-bot:
    image: python:3.12-slim
    working_dir: /app
    command: >
      bash -c "pip install -q --no-cache-dir -r /app/requirements.txt &&
               uvicorn app:app --host 0.0.0.0 --port 8602"
    ports:
      - "8602:8602"
    volumes:
      - ./:/app          # the code
      - ./data:/data     # persists reading.db across restarts
    env_file:
      - .env
    restart: unless-stopped
