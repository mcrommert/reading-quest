# Save as docker-compose.yml and run:  docker compose up -d
# Runs with the sample readers out of the box — no other files required.
services:
  reading-bot:
    # Pull the published multi-arch image (amd64 + arm64) — no build needed.
    image: ghcr.io/mcrommert/reading-quest:latest
    # To build from source instead, comment the image line above, uncomment
    # the next line, and run `docker compose up -d --build`:
    # build: .
    ports:
      - "8602:8602"
    volumes:
      - ./data:/data     # persists reading.db across restarts + image updates
      # Use your own family: create reader_config.py (see README), then uncomment:
      # - ./reader_config.py:/app/reader_config.py:ro
      # Optional Google Calendar service-account key:
      # - ./gcal-credentials.json:/data/gcal-credentials.json:ro
    env_file:
      - path: .env     # optional integrations; fine if this file doesn't exist
        required: false
    restart: unless-stopped
